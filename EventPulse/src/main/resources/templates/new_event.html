<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/}">EventPulse</a>
    </div>
</nav>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-bottom">
                    <h1 class="h4 mb-0" th:text="${event.id != null} ? 'Edit Event' : 'Add New Event'">Add New Event</h1>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/saveEvent}" th:object="${event}" method="post">
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label for="title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="title" th:field="*{title}">
                        </div>

                        <div class="mb-3">
                            <label for="eventDate" class="form-label">Event Date</label>
                            <input type="date" class="form-control" id="eventDate" th:field="*{eventDate}">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="attendance" class="form-label">Attendance</label>
                                <input type="number" class="form-control" id="attendance" th:field="*{attendance}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="wifiEstimate" class="form-label">WiFi Estimate</label>
                                <input type="number" class="form-control" id="wifiEstimate" th:field="*{wifiEstimate}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="networkUsage" class="form-label">Network Usage (GB)</label>
                            <input type="number" step="0.01" class="form-control" id="networkUsage" th:field="*{networkUsage}">
                        </div>

                        <div class="mb-4">
                            <label for="notes" class="form-label">Notes</label>
                            <textarea class="form-control" id="notes" rows="4" th:field="*{notes}"></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save Event</button>
                            <a class="btn btn-outline-secondary" th:href="@{/}">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="text-center text-muted py-4 border-top bg-white">
    <small>EventPulse &mdash; Software Engineering Capstone</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
