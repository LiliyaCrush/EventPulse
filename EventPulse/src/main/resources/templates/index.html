<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EventPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/}">EventPulse</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" th:href="@{/showNewEventForm}">Add New Event</a>
            <a class="btn btn-light btn-sm text-primary" th:href="@{/reports/attendance}">Reports</a>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h1 class="h3 mb-1">Event Management</h1>
                    <p class="text-muted mb-0">View, search, and manage network event records.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h2 class="h5 card-title mb-3">Search Events</h2>
                    <form th:action="@{/searchEvents}" method="get" class="row g-3 align-items-end">
                        <div class="col-md-8 col-lg-9">
                            <label for="keyword" class="form-label">Search by title or notes</label>
                            <input type="text" class="form-control" id="keyword" name="keyword"
                                   th:value="${keyword}" placeholder="Title or notes">
                        </div>
                        <div class="col-md-4 col-lg-3 d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-grow-1">Search</button>
                            <a class="btn btn-outline-secondary" th:href="@{/}">Clear</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-bottom">
                    <h2 class="h5 mb-0">Events</h2>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle mb-0">
                            <thead class="table-primary">
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">Title</th>
                                <th scope="col">Event Date</th>
                                <th scope="col">Attendance</th>
                                <th scope="col" class="text-end">Action</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="event : ${events}">
                                <td th:text="${event.id}"></td>
                                <td th:text="${event.title}"></td>
                                <td th:text="${event.eventDate}"></td>
                                <td th:text="${event.attendance}"></td>
                                <td class="text-end text-nowrap">
                                    <a class="btn btn-sm btn-outline-primary me-1"
                                       th:href="@{/showFormForUpdate/{id}(id=${event.id})}">
                                        Edit
                                    </a>
                                    <a class="btn btn-sm btn-outline-danger"
                                       th:href="@{/deleteEvent/{id}(id=${event.id})}">
                                        Delete
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="text-center text-muted py-4 border-top bg-white">
    <small>EventPulse &mdash; Software Engineering Capstone</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
