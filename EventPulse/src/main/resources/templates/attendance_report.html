<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Event Attendance Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-semibold" th:href="@{/}">EventPulse</a>
        <div class="d-flex gap-2 align-items-center">
            <a class="btn btn-outline-light btn-sm" th:href="@{/}">Back to Home</a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h1 class="h3 mb-2">Event Attendance Report</h1>
                    <p class="text-muted mb-0">
                        <strong>Generated:</strong>
                        <span th:text="${#temporals.format(reportGeneratedAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-bottom">
                    <h2 class="h5 mb-0">Event Summary</h2>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle mb-0">
                            <thead class="table-primary">
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">Title</th>
                                <th scope="col">Event Date</th>
                                <th scope="col">Attendance</th>
                                <th scope="col">WiFi Estimate</th>
                                <th scope="col">Network Usage</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="event : ${events}">
                                <td th:text="${event.id}"></td>
                                <td th:text="${event.title}"></td>
                                <td th:text="${event.eventDate}"></td>
                                <td th:text="${event.attendance}"></td>
                                <td th:text="${event.wifiEstimate}"></td>
                                <td th:text="${event.networkUsage}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a class="btn btn-primary" th:href="@{/}">Back to Home</a>
    </div>
</div>

<footer class="text-center text-muted py-4 border-top bg-white">
    <small>EventPulse &mdash; Software Engineering Capstone</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
